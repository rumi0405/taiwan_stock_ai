name: 每日台股自動分析

on:
  schedule:
    - cron: '30 10 * * 1-5' # 國際標準時間 10:30，等於台灣時間每週一至週五下午 18:30 自動執行
  workflow_dispatch: # 允許你隨時手動點擊執行

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要工具
      run: |
        pip install yfinance pandas google-generativeai

    - name: 執行分析程式
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 讀取你的保險箱金鑰
      run: |
        python main.py

    - name: 自動把產出的報告上傳存檔
      uses: actions/upload-artifact@v3
      with:
        name: 台股AI報告
        path: report_*.md
