name: 每日台股自動分析

on:
  schedule:
    - cron: '30 10 * * 1-5' # 台灣時間每週一至週五下午 18:30 自動執行
  workflow_dispatch: # 允許手動執行

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要工具
      run: |
        pip install yfinance pandas google-generativeai

    - name: 執行分析程式
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py

    # 官方外掛最完美的語法：用 file:// 直接把剛剛生好的 report.html 整份塞進信件內文發送！
    - name: 發送 AI 盤後報告到 Gmail
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_SENDER }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: 📊 台股 AI 盤後決策報告
        to: ${{ secrets.EMAIL_RECEIVER }}
        from: GitHub 自動化機器人
        html_body: file://report.html  # 直接讀取檔案內容當網頁內文發送
