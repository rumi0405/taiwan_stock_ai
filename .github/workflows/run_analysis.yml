name: 每日台股自動分析

on:
  schedule:
    - cron: '30 10 * * 1-5' # 台灣時間每週一至週五下午 18:30 自動執行
  workflow_dispatch: # 允許手動執行

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要工具
      run: |
        pip install yfinance pandas google-generativeai

    - name: 執行分析程式
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py

    # 新增這一步：把剛剛生好的 md 檔案內容讀出來，存成一個臨時變數
    - name: 讀取報告內容
      id: read_report
      run: |
        REPORT_BODY=$(cat report_*.md)
        # 處理換行符號以符合 GitHub 變數規範
        REPORT_BODY="${REPORT_BODY//$'\n'/'<br>'}"
        echo "content=$REPORT_BODY" >> $GITHUB_OUTPUT

    # 修改外掛設定：把讀出來的內容直接當作信件 Body 發送！
    - name: 發送 AI 盤後報告到 Gmail
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_SENDER }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: 📊 台股 AI 盤後決策報告
        to: ${{ secrets.EMAIL_RECEIVER }}
        from: GitHub 自動化機器人
        html_body: |
          ${{ steps.read_report.outputs.content }}
